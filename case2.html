<style>
body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 16px; line-height: 1.6; }

<body>
<h1>Case 2. Inputs inside a container with a click listener</h1>

<p>The same date and time inputs, but placed inside a container that has a click event listener. Lots of real sites are built this way. Swipe through with VoiceOver on and compare with case 1.</p>

<div id="wrap">
<label for="d">Date</label>
<input type="date" id="d">

<label for="t">Time</label>
<input type="time" id="t">
</div>

document.getElementById('wrap').addEventListener('click', function () {});
